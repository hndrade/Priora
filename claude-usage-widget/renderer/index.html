<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'">
  <title>Claude Usage Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">

    <!-- Cabeçalho -->
    <div class="header">
      <span class="chip" id="chip">—</span>
      <span class="title">Claude Usage</span>
      <div class="actions">
        <button id="btn-refresh" title="Atualizar agora">&#x21bb;</button>
        <button id="btn-settings" title="Ajustes">&#x2699;</button>
        <button id="btn-close" title="Sair">&#x2715;</button>
      </div>
    </div>

    <!-- Barra de contagem até o próximo refresh (clique = atualizar) -->
    <div class="refresh-track" id="refresh-track" title="Próxima atualização — clique para atualizar agora">
      <div class="refresh-bar" id="refresh-bar"></div>
    </div>

    <!-- Tela principal -->
    <div class="view" id="view-main">
      <div class="window-row">
        <div class="window-head">
          <span class="window-name">5 HORAS</span>
          <span class="window-pct" id="h5-pct">—%</span>
          <span class="window-reset" id="h5-reset"></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="h5-bar"></div></div>
      </div>

      <div class="window-row">
        <div class="window-head">
          <span class="window-name">7 DIAS</span>
          <span class="window-pct" id="d7-pct">—%</span>
          <span class="window-reset" id="d7-reset"></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="d7-bar"></div></div>
      </div>

      <div class="footer">
        <span class="claim" id="claim"></span>
        <canvas id="spark" width="96" height="24"></canvas>
      </div>

      <div class="banner hidden" id="banner"></div>
    </div>

    <!-- Tela de token -->
    <div class="view hidden" id="view-token">
      <p class="hint">Gere um token com <code>claude setup-token</code> e cole abaixo
        (<code>sk-ant-oat01-…</code>). Ele fica cifrado no seu Windows (DPAPI).</p>
      <input type="password" id="token-input" placeholder="sk-ant-oat01-..." spellcheck="false">
      <div class="row">
        <button class="btn primary" id="btn-token-save">Salvar</button>
        <button class="btn hidden" id="btn-token-cancel">Voltar</button>
      </div>
      <p class="error hidden" id="token-error"></p>
    </div>

    <!-- Tela de ajustes -->
    <div class="view hidden" id="view-settings">
      <div class="setting">
        <span>Intervalo de atualização</span>
        <button class="btn small" id="btn-interval">2 min</button>
      </div>
      <div class="setting">
        <span>Iniciar com o Windows</span>
        <button class="btn small" id="btn-autolaunch">não</button>
      </div>
      <div class="setting">
        <span>Opacidade</span>
        <input type="range" id="opacity-range" min="0.4" max="1" step="0.05">
      </div>
      <div class="setting">
        <span>Token</span>
        <button class="btn small" id="btn-change-token">trocar…</button>
      </div>
      <div class="row">
        <button class="btn primary" id="btn-settings-back">Voltar</button>
        <button class="btn danger" id="btn-quit">Sair do widget</button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
